[Q] Co to bridging i czym się różni routingu

[Q] Co to jest tablica bridgingu

c) protokół warstwy aplikacji służący do bezpiecznej synchronizacji czasu systemowego na urządzeniach sieciowych za pomocą serwerów NTP

[Q] Do czego służy iptables?

b) do wyświetlania statycznego mapowania adresów IP na adresy fizyczne MAC w lokalnej tablicy ARP systemu Linux
c) do monitorowania i analizy opóźnień transmisji światłowodowej w sieciach szkieletowych przy użyciu protokołu ICMP
d) do automatycznego rozgłaszania adresów bramy domyślnej w protokołach routingu dynamicznego RIP oraz OSPF

[Q] Co to jest TC?
>>>a) Traffic Control - narzędzie w systemie Linux służące do manipulowania ruchem sieciowym, umożliwiające m.in. ograniczanie pasma, priorytetyzację pakietów oraz symulowanie opóźnień i strat
b) Transmission Control - protokół warstwy transportowej odpowiedzialny za sprzętową fragmentację ramek Ethernet bezpośrednio na interfejsach radiowych WLAN
c) Topology Change - specjalny typ komunikatu w protokole Spanning Tree (STP), który wymusza na przełącznikach warstwy II natychmiastowe usunięcie lokalnej bazy danych DNS
d) Tunneling Controller - moduł jądra Linux odpowiedzialny za automatyczne trasowanie pakietów pomiędzy protokołami routingu dynamicznego OSPF oraz BGP
::

b) Częstotliwość fali nośnej (GHz), fizyczny adres MAC karty sieciowej, napięcie elektryczne prądu stałego oraz długość fali świetlnej w kablu
c) Typ kodowania liniowego (np. Manchester), fizyczna szerokość pasma miedzi wyrażana w hercach (Hz) oraz kierunkowość anteny nadawczej

[Q] Za co odpowiada pre i postrouting?
>>>a) PREROUTING odpowiada za modyfikację pakietów przed podjęciem decyzji o routingu (np. DNAT / przekierowanie portów), a POSTROUTING za modyfikację pakietów po podjęciu decyzji o routingu, tuż przed ich wysłaniem w świat
b) PREROUTING służy do sprawdzania spójności bazy danych adresów fizycznych MAC, natomiast POSTROUTING odpowiada za sprzętową fragmentację ramek w standardzie OFDM
c) PREROUTING to proces rezerwacji czasu antenowego za pomocą mechanizmu RTS/CTS, a POSTROUTING to metoda wykrywania anomalii wydajności na punktach dostępowych
d) PREROUTING odpowiada za automatyczne przydzielanie adresów IP przez serwer DHCP, a POSTROUTING za natychmiastowe czyszczenie wpisów w lokalnej pamięci podręcznej DNS
::

b) Posiadają dedykowane, sprzętowe układy wzmacniaczy sygnału i pozwalają na jednoczesną pracę każdego wirtualnego interfejsu na zupełnie innych częstotliwościach radiowych
c) Są automatycznie usuwane przez mechanizm Airtime Fairness (ATF) w sytuacji, gdy w sieci bezprzewodowej pojawia się problem ukrytego węzła

[Q] Czym jest PTK w WPA/WPA2?

c) Klucz główny (Master Key), wprowadzany przez administratora jako hasło do sieci, z którego bezpośrednio generowane są identyfikatory SSID.

[Q] Do czego służy GTK

c) Klucz generowany dynamicznie przez narzędzie aireplay-ng w celu sztucznego zwiększenia czasu antenowego (Airtime Fairness)
d) Unikalny klucz sesyjny, używany wyłącznie do szyfrowania bezpośredniego ruchu dwukierunkowego (Unicast) pomiędzy konkretną stacją a AP

[Q] Jak tablice tęczowe przyspieszają łamanie kluczy?

b) Sprzętowo modyfikują architekturę układu scalonego karty radiowej, zwiększając liczbę operacji zmiennoprzecinkowych na sekundę (FLOPS) podczas ataku
c) Automatycznie dzielą 8-cyfrowy kod PIN protokołu WPS na dwie niezależne części, co zmniejsza łączną liczbę kombinacji kryptograficznych do 11 000
d) Blokują przesyłanie ramek Beacon oraz rozgłoszeniowych kluczy GTK, zmuszając punkt dostępowy do przejścia w tryb uproszczonego kodowania bez soli (SSID)

[Q] Co to WPS

b) WPS - Wi-Fi Protected Security - standard szyfrowania nowej generacji wprowadzony w WPA3, który całkowicie zastępuje klucze PTK oraz PMK na poziomie warstwy fizycznej.
c) WPS - Wired Preamble Sequence - stała przerwa międzyramkowa w standardzie 802.11a/ac, służąca do sprzętowej rezerwacji czasu antenowego zamiast mechanizmu RTS/CTS.
d) WPS - Wireless Packet Shaper - podsystem jądra Linux zintegrowany z Traffic Control (tc), automatycznie fragmentujący ramki w celu eliminacji anomalii wydajności.
::

c) Klucz warstwy fizycznej (Physical Modality Key), który odpowiada za sprzętowe kodowanie symboli OFDM na kanałach 5 GHz.
d) Dynamiczny klucz sesyjny wstrzykiwany przez narzędzie aireplay-ng podczas ataku deautentykacji w celu przejęcia kontroli nad adresem MAC.

[Q] Jaka jest rola suplikanta w systemie RADIUS
>>>a) suplikant się uwierzytelnia i uzyskuje dostęp do sieci (albo nie)
b) suplikant to fizyczna antena kierunkowa MIMO stosowana w standardzie 802.11ac do automatycznego rozpraszania widma kodem Barkera
c) suplikant to protokół routingu dynamicznego w sieciach ad-hoc służący do przesyłania pakietów IP bezpośrednio do publicznych serwerów DNS w pasmie 2,4Ghz
d) suplikant to centralna baza danych zainstalowana na serwerze RADIUS która odpowiada za sprzętowe szyfrowanie adresów MAC w warstwie III
::

[Q] W jakiej warstwie działa IEEE 802.1x i co robi?
>>>a) W warstwie 2 MAC, defaultowo blokuje port do którego przyłącza się nowy suplikant, jedyne ramki, jakie mogą być przesyłane przed uwierzytelnieniem to ramki EAPOL.
b) W warstwie III sieciowej, odpowiada za dynamiczny przydział adresów IP oraz automatyczne trasowanie pakietów pomiędzy antenami MIMO w pasmie 2,4Ghz
c) w warstwie VII aplikacji, służy do mapowania nazw domenowych bezpośrednio w bazie danych serwera DNS dla sieci typu ad-hoc
d) w warstwie I fizycznej, reguluje dopuszczalną moc nadawania fal radiowych dla standardu 802.11ac i wymusza stosowanie kodu Barkera
::

[Q] Co to EAPOL i gdzie się pojawia
>>>a) ramka warstwy 2, standardu 802.1x, występuje pomiędzy suplikantem i authenticatorem, umożliwia uwierzytelnienie.
b) pakiet warstwy III protokołu routingu dynamicznego występujący pomiędzy serwerem RADIUS a bazą DNS w celu synchronizacji adresów IP
c) protokół zarządzania zasilaniem w standardzie 802.11ac odpowiedzialny za automatyczne wyłączanie nadajnika AP po wykryciu braku aktywności suplikanta
d) algorytm szyfrowania sprzętowego stosowany wyłącznie przez anteny MIMO w pasmie 2,4Ghz dla sieci pracujących w trybie ad-hoc
::

[Q] Kim jest authenticator i jakie jest jego zadanie?
>>>a) Authenticator to urządzenie warstwy II (AP/SWITCH), które umożliwia kontakt suplikanta z serwerem RADIUS, oraz realizuje blokowanie portu zgodnie z 802.1x
b) Authenticator to oprogramowanie klienckie instalowane na systemie operacyjnym stacji roboczej służące do generowania sum kontrolnych MD5 w warstwie III
c) Authenticator to centralna baza danych DNS zlokalizowana w chmurze która dynamicznie przydziela adresy IP dla urządzeń pracujących w trybie ad-hoc
d) Authenticator to fizyczna antena MIMO odpowiedzialna za sprzętowe szyfrowanie nagłówków ramek 802.11 wyłącznie dla pasma 2,4Ghz
::

[Q] Co to AAA i co to?
>>>a) Authentication, Authorization, Accounting, to jest idea zarządzania bezpieczenstwem w sieciach komputerowych.
b) AAA to technologia modulacji radiowej odpowiedzialna za automatyczne przełączanie szerokości kanału z 20Mhz na 40Mhz w pasmie 2,4Ghz
c) AAA to protokół synchronizacji czasu w strukturach BSS który przesyła tablice adresów MAC bezpośrednio do publicznych serwerów DNS przy użyciu kodu Barkera
d) AAA to skrót od Advanced Address Allocation czyli algorytmu warstwy III służącego do sprzętowego trasowania pakietów w sieciach ad-hoc bez udziału AP
::

[Q] Dlaczego PEAP jest najczęściej używany?
>>>a) Bo stanowi dobry kompromis pomiedzy kosztem, a bezpieczenstwem (certyfikat po stronie serwera, login i hasło po stronie użytkownika)
b) bo jest to jedyny protokół w warstwie III który automatycznie podwaja zasięg anten MIMO w pasmie 2,4Ghz bez użycia prądu
c) Bo jako jedyny standard eliminuje nagłówki ramek 802.11 i pozwala na bezpośrednie przesyłanie adresów MAC do serwerów DNS w sieciach ad-hoc
d) bo nie wymaga stosowania żadnych mechanizmów kryptograficznych ani uwierzytelniania opierając się na sprzętowej filtracji portów AP
::

[Q] Czym jest MSCHAP/MSCHAPv2 ? 
>>>a) To protokoły uwierzytelniania klienta od Microsoft, opierajace się na ideii challenge message, gdzie serwer wysyła ciag znaków, klient odsyła ten ciag zaszyfrowany i pozniej serwer stwierdza czy klient zna hasło czy nie.
b) to protokoły routingu dynamicznego w warstwie III odpowiedzialne za sprzętowe przełączanie pakietów IP pomiędzy antenami MIMO w sieciach ad-hoc
c) to bezprzewodowe systemy dystrybucji sygnału radiowego w pasmie 5Ghz które eliminują potrzebę stosowania adresów MAC przez AP
d) to standardy modulacji szerokopasmowej przesyłające dane w postaci czystego tekstu bezpośrednio do serwerów DNS za pomocą kodu Barkera
::

[Q] Który EAP jest najbezpieczniejszy i dlaczego?
>>>a) EAP-TLS jest najbezpieczniejszy, ponieważ używa certyfikatów cyfrowych po obu stronach (serwera i klienta), oraz tworzy tunel TLS.
b) EAP-MD5 jest najbezpieczniejszy ponieważ wykorzystuje jednokierunkowy algorytm skrótu w pasmie 2,4Ghz bez konieczności tworzenia tunelu w warstwie III
c) LEAP jest najbezpieczniejszy ponieważ opiera się na dynamicznym szyfrowaniu adresów MAC bezpośrednio przez sprzętowe kontrolery AP sieci ad-hoc
d) EAP-FAST jest najbezpieczniejszy ponieważ eliminuje potrzebę stosowania jakichkolwiek kluczy kryptograficznych i przesyła dane jawnym tekstem bezpośrednio do serwera DNS
::

[Q] Dlaczego w sieci bezprzewodowej protokół EAP-MD5 Challenge nie jest używany podczas procesu uwierzytelniania
>>>a) Ponieważ hash hasła MD5 jest wysyłany w sieci clear textem i bardzo łatwo można go podsłuchać.
b) ponieważ algorytm MD5 działa wyłącznie w warstwie III modelu osi co uniemożliwia urządzeniom MIMO odczytanie nagłówka pakietu IP
c) ponieważ EAP-MD5 wymaga do działania fizycznego połączenia kablowego w standardzie 802.3 i nie potrafi przetłumaczyć ramek w pasmie 2,4Ghz
d) ponieważ EAP-MD5 przesyła dane za pomocą protokołu TACACS+ który generuje zbyt duże opóźnienia radiowe dla sieci typu ad-hoc
::

[Q] Jakie są serwery AAA inne niż RADIUS? Proszę podać podstawowe różnice między nimi. Czy możliwe jest użycie innych serwerów wraz z protokołem IEEE 802.1x?
>>>a) Oprócz RADIUS jest jeszcze TACACS+, który korzysta z TCP, całkowicie rozdziela Autoryzacje, Autentykacje i Accounting, szyfruje całe ciało pakietu (całą transmisje).
b) jedynym serwerem AAA jest TACACS który przesyła dane bez użycia warstwy transportowej TCP/UDP i służy wyłącznie do dynamicznego przydzielania pasma dla anten MIMO
c) oprócz RADIUS jest jeszcze protokół DHCP który rozdziela procesy AAA w warstwie III za pomocą pakietów UDP i szyfruje nagłówki ramek 802.11 dla pasma 2,4Ghz
d) alternatywą dla RADIUS jest protokół SNMP który pozwala na realizację standardu IEEE 802.1x w sieciach ad-hoc poprzez mapowanie adresów MAC bezpośrednio w bazie DNS
::

[Q] Jak wymusić na przełączniku Cisco, że niezależnie od prób uwierzytelnienia klienta - port zawsze będzie w stanie nieuwierzytelnionym.
>>>a) Konfigurując na konkretnym if: dot1x port-control force-unauthorized
b) konfigurując na interfejsie komendę authentication host-mode multi-auth która wymusza automatyczne odrzucanie wszystkich pakietów IP w warstwie III
c) ustawiając globalnie funkcję ip arp inspection trust która powoduje permanentne blokowanie tablicy adresów MAC dla urządzeń ad-hoc
d) wpisując na konkretnym if polecenie switchport mode access vlan 999 w celu sprzętowego wyłączenia nadajnika radiowego dla pasma 2,4Ghz
::

[Q] Jak skonfigurować przełącznik, aby wymuszał okresowe ponowne uwierzytelnianie klienta? Proszę podać i omówić odpowiednią składnię poleceń. Proszę rozważyć, w jakich sytuacjach taka konfiguracja może być przydatna?
>>>a) Konfigurując na konkretnym if: authentication periodic
b) konfigurując na porcie polecenie ip dhcp snooping limit rate 3600 które blokuje pakiety uwierzytelniające w warstwie III po przekroczeniu limitu czasu
c) wpisując globalnie komendę switchport port-security aging time 60 w celu sprzętowego czyszczenia tablicy adresów MAC co każdą minutę
d) ustawiając na interfejsie vlan funkcję crypto isakmp policy która wymusza resetowanie kluczy szyfrujących TCP/UDP dla pasma 2,4Ghz
::

[Q] Jakie szerokości kanału są dostępne w standardzie 802.11ac?
>>>a) dla 5Ghz: 20Mhz, 40Mhz, 80Mhz, 160Mhz
b) dla 5Ghz oraz nowego pasma 6Ghz: dostępne są tylko i wyłącznie wąskie kanały 5Mhz oraz 10Mhz zaprojektowane dla urządzeń IoT
c) dla 2,4Ghz: 20Mhz oraz 40Mhz, natomiast dla pasma 5Ghz wprowadzono wyłącznie jeden stały kanał o szerokości 320Mhz
d) dla wszystkich pasm częstotliwości: standard 802.11ac nie definiuje szerokości kanału, ponieważ opiera się na dynamicznym przeskoku częstotliwości FHSS
::

[Q] Jakie są możliwe konfiguracje w Wi-Fi
>>>a) IBSS, BSS, ESS
b) RIP, OSPF, BGP
c) HTTP, FTP, SMTP
d) LAN, MAN, WAN
::

[Q] Co to OFDM?
>>>a) Rodzaj modulacji, rozbijający szybką transmisje na wiele wolniejszych, równoległych transmisji, przeniesionych do ortogonalnych względem siebie częstotliwości nośnych.
b) OFDM to technika cyfrowego wzmacniania sygnału analogowego realizowana wyłącznie za pomocą anten kierunkowych MIMO w paśmie 2,4Ghz
c) OFDM to protokół szyfrowania klucza radiowego w warstwie III stosowany zamiennie z systemem DSSS w sieciach typu ad-hoc
d) OFDM to sprzętowy algorytm agregacji portów w przełącznikach sieciowych łączących kontrolery AP z siecią szkieletową
::

[Q] Czy jeśli urządzenie ma kanał o szerokości 80 MHz to może pracować z urządzeniem o typie modulacji DSSS?
>>>a) tak, ale urządzenie o szerokości kanału 80 MHz musi przejść w tryb kompatybilności wstecznej na pasmo 2,4 GHz i zredukować szerokość kanału do 20 MHz
b) tak, ponieważ modulacja DSSS automatycznie multiplikuje szerokość pasma radiowego do wartości 80 MHz za pomocą ramek kontrolnych w warstwie III
c) nie, ponieważ standard DSSS wymaga światłowodowego połączenia synchronicznego i nie obsługuje transmisji radiowych w topologii ESS
d) nie, gdyż modulacja DSSS działa wyłącznie na przełącznikach warstwy II obsługujących sprzętowe tagowanie ramek VLAN metodą 802.1Q
::

[Q] Czym jest ad-hoc i czym się charakteryzuje?
>>>a) ad-hoc to bezprzewodowa sieć pomidzy urządzeniami (kartami sieciowymi) bez obecności AP.
b) ad-hoc to tryb pracy w którym stacje klienckie nawiązują połączenie tylko i wyłącznie z serwerem DHCP za pomocą protokołu WDS
c) ad-hoc to odmiana infrastruktury BSS w której funkcja AP jest emulowana programowo w warstwie III przez centralną bazę adresów MAC
d) ad-hoc to sieć szkieletowa łącząca wiele AP za pomocą światłowodu pracująca wyłącznie w warstwie I modelu osi
::

[Q] 802.11n jakie nowości i usprawnienia?
>>>a) 802.11n wprowadziło MIMO, działało na 2,4Ghz: 20 i 40Mhz, oraz na 5Ghz: 20 i 40Mhz.
b) 802.11n wprowadziło technologię OFDMA oraz modulację 1024-QAM co pozwoliło na podział jednego kanału radiowego na podkanały dla wielu użytkowników jednocześnie
c) 802.11n zlikwidowało całkowicie pasmo 2,4Ghz i jako pierwszy standard w historii wprowadziło obsługę kanałów o szerokości 160Mhz wyłącznie w pasmie 5Ghz
d) 802.11n wprowadziło sprzętowe trasowanie pakietów w warstwie III pomiędzy AP a serwerem radius za pomocą protokołu uwierzytelniania WPA3
::

[Q] Czy OFDM dogada się z DSSS?
>>>a) nie, ponieważ urządzenia DSSS i OFDM nie potrafią bezpośrednio ze sobą rozmawiać i dekodować wzajemnych transmisji
b) tak, pod warunkiem że oba urządzenia są podłączone do tego samego serwera DNS i mają przypisane statyczne adresy MAC w tablicy ARP
c) nie, ponieważ standard OFDM wymaga do działania kabli światłowodowych w technologii GPON i nie potrafi nadawać sygnału w topologii gwiazdy
d) tak, ponieważ protokół routingu dynamicznego OSPF automatycznie konwertuje ramki OFDM na pakiety IP obsługiwane przez standard DSSS
::

[Q] Po co stosuje się RTS/CTS w ad-hoc
>>>a) RTS/CTS wykorzystuje się w ad-hoc dla dużych ramek (RTS/CTS Threshold) po to aby rozwiązać problem ukrytego węzła i uniknąć kolizji pakietów w eterze poprzez rezerwację kanału radiowego
b) RTS/CTS wykorzystuje się w ad-hoc dla dużych ramek (RTS/CTS Threshold) po to aby serwer DHCP mógł automatycznie mapować adresy IP bezpośrednio w tablicy routingu BGP
c) RTS/CTS wykorzystuje się w ad-hoc dla dużych ramek (RTS/CTS Threshold) po to aby wymusić sprzętowe szyfrowanie bazy danych DNS na poziomie przełączników warstwy III
d) RTS/CTS wykorzystuje się w ad-hoc dla dużych ramek (RTS/CTS Threshold) po to aby przesyłać ramki Ethernet za pomocą światłowodów jednomodowych z pominięciem kart sieciowych
:: Kolizja im większej ramki - tym kosztowniejsza retransmisja

[Q] Czym charakteryzuje się sieć WLAN w trybie ad-hoc
>>>a) Tym że nie ma udziału AP
b) tym że przydzielanie adresów IP odbywa się wyłącznie za pomocą centralnego serwera DHCP zainstalowanego na dedykowanym kontrolerze AP
c) Tym że zasięg transmisji radiowej jest nieograniczony dzięki automatycznemu mostkowaniu ramek w pasmie 5Ghz przez serwery DNS
d) tym że wymaga połączenia kablowego pomiędzy wszystkimi stacjami klienckimi w celu synchronizacji tablicy adresów MAC w warstwie
::

[Q] Do czego służy i jaki wpływ ma parametr Fragmentation Threshold? 
>>>a) Paramter określający rozmiar ramki w bajtach, od ktorego ramka bedzie dzielona na fragmenty.
b) Fragmentation Threshold to parametr określający maksymalną liczbę pakietów IP jakie router może odrzucić w ciągu jednej sekundy w przypadku przeciążenia bufora w warstwie III
c) Fragmentation Threshold to algorytm stosowany wyłącznie w pasmie 5Ghz służący do automatycznego dzielenia szerokości kanału 80Mhz na cztery niezależne strumienie MIMO
d) Fragmentation Threshold to unijny standard określający dopuszczalny poziom tłumienia sygnału radiowego przez ściany żelbetowe przy nadawaniu z maksymalną mocą 100mW
::

[Q] Co to DSSS i w jakich standardach występuje?
>>>a) DSSS - Direct Sequence Spread Spectrum  - rozpraszanie widma jakimś kodem pseudolosowym np. Barkera. Dotyczy 802.11 Legacy oraz 802.11b.
b) DSSS to protokół dynamicznego wyboru kanału radiowego w pasmie 5Ghz stosowany w standardach 802.11ac oraz 802.11ax w celu unikania radarów pogodowych
c) DSSS to system szyfrowania ramek zarządzających w warstwie III wprowadzony jako obowiązkowy element zabezpieczeń WPA3 dla standardu 802.11be
d) DSSS to technika agregacji wielu kanałów o szerokości 20Mhz w jeden superkanał stosowana wyłącznie w sieciach ad-hoc w pasmie 6Ghz
::

[Q] Czy OFDM i MIMO mogą pracować razem w jednej sieci ad-hoc?
>>>a) Tak, MIMO to odbieranie i wysyłanie wieloma zestawami anten, OFDM to modulacja
b) Tak, pod warunkiem że modulacja OFDM zostanie całkowicie wyłączona w celu synchronizacji bazy danych serwera DNS przy użyciu adresów MAC
c) nie, ponieważ technologia MIMO wymaga do działania wyłącznie przewodowych przełączników warstwy III i nie potrafi nadawać sygnału radiowego
d) nie, ponieważ standard OFDM automatycznie blokuje działanie portów w przełącznikach sieciowych i uniemożliwia realizację routingu BGP
::

[Q] Czy ad-hoc może działać przy OFDM i DSSS
>>>a) Urządzenia będą działać (karty sieciowe rozgłoszą SSID), natomiast komunikacja pomiędzy nimi nie będzie możliwa (niekompatybilność warstwy fizycznej)
b) tak, pod warunkiem że sieć ad-hoc zostanie podłączona do światłowodu GPON za pomocą przełącznika warstwy III z obsługą tagowania VLAN
c) Jednoczesne uruchomienie tych dwóch technologii powoduje sprzętowe usunięcie lokalnej bazy danych serwera DNS
d) tak, ponieważ protokół routingu dynamicznego OSPF automatycznie konwertuje sygnał OFDM na pakiety IP zrozumiałe dla standardu DSSS
::

[Q] Kiedy używać RTS/CTS
>>>a) Wtedy kiedy występuje ryzyko ukrytego węzła w sieci - kiedy jedno urządzenie nie "widzi" bezpośrednio drugiego urządzenia zdolnego nadawać
b) wyłącznie podczas konfiguracji statycznego routingu BGP na przełącznikach warstwy II w celu zwiększenia prędkości przesyłania plików tekstowych
>>>c) Dla dużych pakietów (RTS Threshold)
d) w sytuacji gdy serwer DHCP nie posiada wolnych adresów IP w puli i zachodzi potrzeba automatycznego zresetowania lokalnej bazy danych DNS
::

[Q] Czym jest OFDM i jakie standardy go wykorzystują
>>>a) OFDM to modulacja i występuje on od standardu 802.11a
b) OFDM to system sprawdzania spójności światłowodów GPON wykorzystujący wyłącznie adresowanie fizyczne MAC w warstwie II, występuje od 802.11ac
c) OFDM to sprzętowy standard zasilania POE stosowany od pierwszej wersji kabli koncentrycznych w topologii magistrali, występuje od 802.11ax
d) OFDM to protokół routingu zewnętrznego BGP służący do automatycznego czyszczenia pamięci podręcznej serwerów DNS, występuje od 802.11a
::

[Q] Co to BSS i IBSS
>>>a) BSS to sieć z jednym AP, a IBSS to sieć bez żadnego AP (ad-hoc)
b) BSS to protokół szyfrowania danych w warstwie III, a IBSS to system dynamicznego przydzielania adresów IP przez AP
c) BSS to sieć działająca wyłącznie w pasmie 2,4Ghz, a IBSS to sieć obsługująca pasmo 5Ghz oraz technologię MIMO
d) BSS to sieć z wieloma AP połączonymi przewodowo, a IBSS to sieć wykorzystująca bezprzewodowy system dystrybucji WDS
::

[Q] Czy dwa różne urządzenia w standardach 802.11a i 802.11ac mogą pracować na tym samym kanale 
radiowym?
>>>a) Tak, obydwa te standardy działają w oparciu o OFDM oraz na 5Ghz
b) Tak, ponieważ standard 802.11ac automatycznie konwertuje sygnał cyfrowy na modulację DSSS w celu zachowania pełnej zgodności w paśmie 2,4 GHz
c) Nie, ponieważ standard 802.11ac wymaga do działania wyłącznie technologii OFDMA, która fizycznie uniemożliwia odbiór starszych ramek OFDM
d) Nie, ponieważ urządzenia w standardzie 802.11a pracują na stałej szerokości kanału 40 MHz, co wywołuje permanentne kolizje z kanałami 802.11ac
::

[Q] Jaki jest wpływ RTS-Threshold w WLAN
>>>a) Próg wielkości pakietu, wyrażany w bajtach, od którego następuje rezerwacja łącza RTS/CTS - rozwiązuje to problem ukrytego węzła
b) Maksymalna liczba retransmisji pakietu w warstwie drugiej, po przekroczeniu której ramka jest dzielona na mniejsze części w procesie fragmentacji
c) Czas wyrażany w mikrosekundach, przez który karta sieciowa musi badać czystość kanału radiowego (DIFS) przed przejściem w tryb nadawania
d) Minimalny poziom siły sygnału (wyrażany w dBm), poniżej którego punkt dostępowy ignoruje zapytania stacji klienckich, chroniąc sieć przed anomalią wydajności
::

[Q] Czym jest anomalia wydajności?
>>>a) Anomalia wydajności występuje, gdy mamy w sieci jakieś przestarzałe urządzenie, które osiąga bardzo dużo niższe przepustowości od pozostałych urządzeń - przez co całkowita efektywność i wydajność sieci jest taka jak wydajność tego najsłabszego ogniwa
b) Anomalia wydajności to zjawisko nagłego spadku przepustowości sieci na skutek nakładania się faz fal radiowych (fading), co powoduje całkowite wygaszenie sygnału docierającego do punktu dostępowego
c) Anomalia wydajności to stan, w którym urządzenia z powodu zbyt niskiego progu RSSI bez przerwy przełączają się między standardami DSSS i OFDM, generując pętlę w warstwie drugiej
d) Anomalia wydajności występuje wtedy, gdy mechanizm RTS/CTS rezerwuje pasmo dla zbyt małych ramek danych, przez co czas oczekiwania w kolejce NAV rośnie wykładniczo dla wszystkich stacji
::

[Q] Co to MIMO i w jakich standardach pracuje?
>>>a) MIMO to technologia wysyłania oraz odbierania sygnałów radiowych wieloma zestawami anten jednocześnie. MU MIMO - pozwala "rozmawiać" jakiemuś urządzeniu z paroma innymi urządzeniami jednocześnie.
b) MIMO to algorytm przełączania częstotliwości w warstwie III stosowany w sieciach ad-hoc mający na celu zapobieganie interferencjom od radarów
c) MIMO to protokół autoryzacji adresów mac w sieciach vanet pozwalający na jednoczesne szyfrowanie strumienia danych dla jednego odbiorcy
d) MIMO to technologia modulacji jednokanałowej stosowana wyłącznie w standardzie 802.11b służąca do zwiększania zasięgu fal w pasmie 2,4Ghz
::

[Q] Wymień 3 typy topologii Ad-hoc
>>>a) IBSS (Independent Basic Service Set / klasyczna P2P), MANET (Mobile Ad-hoc Network / sieci ruchome) oraz VANET (Vehicular Ad-hoc Network / sieci pojazdowe).
b) PAN, LAN oraz WAN które określają zasięg terytorialny radiowych sieci stałych bez możliwości przemieszczania się węzłów
c) infrastructure, roaming oraz bridging które definiują sposoby przełączania pakietów w warstwie III modelu osi
d) BSS, ESS oraz WDS które stanowią podstawę konfiguracji infrastrukturalnej z wykorzystaniem centralnego punktu dostępowego
::

[Q] Kiedy zmiana parametrów RTS/CTS Fragmentation Threshold nam pomaga? 
>>>a) Kiedy mamy ukryty węzeł w sieci, oraz chcemy nie narażać odpowiednio dużych pakietów na kolizje, które prowadzą do kosztownych retransmisji.
b) Kiedy chcemy wyeliminować zjawisko anomalii wydajności (Performance Anomaly) poprzez wymuszenie na stacjach klienckich równego dostępu do czasu antenowego (Airtime Fairness)
c) Kiedy w sieci występuje problem odkrytego węzła (Exposed Node Problem) i chcemy zmusić stacje do jednoczesnego nadawania w celu podwojenia przepustowości pasma
d) Kiedy chcemy skrócić czas potrzebny na badanie czystości kanału przed transmisją (DIFS/SIFS) w celu zmniejszenia opóźnień w sieciach o wysokiej gęstości urządzeń
::

[Q] Jaka jest częstotliwość na kanale 36? Które standardy tam pracują?
>>>a) kanał 36 to 5Ghz, czyli fc = 5Ghz + n * 5Mhz , jak n = 36 to fc = 5,18 Ghz. Mogą tam pracować standardy: 802.11a, 802.11n (Wi-Fi 4), 802.11ac (Wi-Fi 5), 802.11ax (Wi-Fi 6) oraz 802.11be (Wi-Fi 7)
b) kanał 36 to podstawowy kanał w nowym pasmie 6Ghz o częstotliwości środkowej 6,18Ghz wprowadzony na potrzeby komunikacji urządzeń w standardzie 802.11ax
c) kanał 36 należy do pasma 2,4Ghz i ze względu na przesunięcie fazowe mogą na nim pracować wyłącznie starsze standardy bezprzewodowe takie jak 802.11b oraz 802.11g
d) kanał 36 to pasmo 5Ghz o częstotliwości 5,36Ghz na którym ze względu na wymogi prawne DFS dopuszczony jest ruch wyłącznie dla urządzeń typu ad-hoc
::

[Q] Jakie są korzyści i potencjalne problemy wynikające z poszerzenia pasma z 20 MHz do 40 MHz
>>>a) większa przepustowość
b) mniejsza przepustowość 
>>>c) więcej retransmisji
>>>d) bardziej zaszumiony sygnał
>>>e) większe ryzyko interfernecji z innymi urządzeniami
::

[Q] Czym różni się AP od routera?
>>>a) AP działa w warstwie II (Bridging), Router działa w wartswie III (Routing)
b) ap działa w warstwie I wzmacniając czysty sygnał analogowy, natomiast router pracuje w warstwie II zajmując się przełączaniem ramek ethernet na podstawie tablicy adresów MAC
c) AP zarządza wyłącznie ruchem w pasmie 2,4Ghz, podczas gdy router jest urządzeniem przeznaczonym do obsługi wyższych częstotliwości takich jak 5Ghz oraz 6Ghz
d) ap wymaga fizycznego połączenia z serwerem DNS w celu translacji adresów, a router wykonuje mapowanie ramek 802.11 na standard 802.3 w sposób całkowicie sprzętowy
::

[Q] Czym jest WDS ?
>>>a) Wireless distribution system - bezprzewodowe połączenie pomiedzy AP, pozwalające zwiększyć pokrycie danej sieci - warstwa II.
b) Wireless Data Security - standard szyfrowania ramek zarządzających w sieciach ad-hoc, operujący w warstwie III.
c) Wireless Discovery System - protokół służący do automatycznego wykrywania i autoryzacji nowych stacji klienckich przez kontroler WLAN.
d) Wired Domain Service - usługa sieciowa mapująca adresy MAC punktów dostępowych na adresy IP w sieci szkieletowej.
::

[Q] Co to DFS i do czego służy
>>>a) Dynamic Frequency Selection - głównie służy do dynamicznego przełączania kanałów - tak żeby transmisja nie interferowała z sygnałami np. radarów wojskowych.
b) Distributed Frequency System - mechanizm w standardzie 802.11, służący do automatycznego zwiększania mocy anteny w przypadku wykrycia martwych stref zasięgu.
c) Dynamic Fragment Service - protokół warstwy II odpowiedzialny za dynamiczne dobieranie wartości parametru Fragmentation Threshold w zależności od szumu radiowego.
d) Dual Frequency Standard - technologia pozwalająca na jednoczesne przesyłanie tego samego strumienia danych na częstotliwości 2,4 GHz oraz 5 GHz w celu eliminacji zakłóceń.
::

[Q] jakie jest podstawowe pasmo w 802.11n ?
>>>a) 20 Mhz, zarówno dla 2,4Ghz i dla 5Ghz
b) 40 MHz, ale wyłącznie dla częstotliwości 5 GHz, podczas gdy dla 2,4 GHz podstawą jest 10 MHz.
c) 80 MHz, ze względu na domyślne stosowanie technologii agregacji przestrzennej MIMO w pasmie 5 GHz.
d) 22 MHz, co wynika z bezpośredniej kompatybilności wstecznej ze starszym standardem 802.11b (DSSS).
::

[Q] Czym jest Repeater i w jakiej warstwie pracuje?
>>>a) Repeater to jest po prostu wzmacniacz sygnału - działa w warstwie I.
b) Repeater to urządzenie przekierowujące pakiety na podstawie tablicy routingu – działa w warstwie III (sieciowej)
c) Repeater to inteligentny punkt dostępowy filtrujący ruch na podstawie adresów MAC – działa w warstwie II (łącza danych)
d) Repeater to programowy translator protokołów bezprzewodowych – działa w warstwie VII (aplikacji).
::

[Q] Co to TPC i po co się go używa?
>>>a) Transmitter Power Control - standard, który mówi, że urządzenia transmisji bezprzewodowej (nadajniki) powinny nadawać sygnał z minimalną możliwą mocą. Minimalizuje to ryzyko interferencji. 
b) Transmission Priority Control - protokół warstwy II odpowiedzialny za nadawanie priorytetów pakietom głosowym VoIP w sieciach ad-hoc
c) Tunneling Protocol Configuration - algorytm automatycznie szyfrujący nagłówki ramek zarządzających w standardzie Wi-Fi 6
d) Thermal Protection Control - zabezpieczenie sprzętowe wyłączające kartę sieciową w przypadku przekroczenia krytycznej temperatury układu scalonego
::

[Q] Na jakiej częstotliwości pracuje kanał 11 i jakie standardy IEEE 802.11 tam mogą pracować? 
>>>a) kanał 11 to pasmo 2,4Ghz. fc = 2,407Ghz + n * 5Mhz, jak n = 11, to fc = 2,462Ghz
b) kanał 11 to pasmo 5Ghz o częstotliwości środkowej 5,055Ghz na którym mogą pracować wyłącznie standardy 802.11a oraz 802.11ac
c) kanał 11 należy do pasma 2,4Ghz, ale ze względu na przepisy prawne w europie został całkowicie wyłączony z użytku dla standardów 802.11g oraz 802.11n
d) kanał 11 to pasmo 6Ghz wprowadzone dopiero w standardzie 802.11be w celu eliminacji interferencji ze starszymi sieciami bezprzewodowymi
::

[Q] W której warstwie działa AP i dlaczego ?
>>>a) w warstwie II, zamienia pakiety sieci przewodowej na pakiety sieci bezprzewodowej LAN -> WLAN, Ethernet -> Wi-Fi
b) w warstwie I, ponieważ zajmuje się wyłącznie modulacją sygnału radiowego i nie analizuje adresów fizycznych MAC podłączonych urządzeń
c) w warstwie III, ponieważ punkt dostępowy musi analizować nagłówki pakietów IP w celu routowania ruchu pomiędzy siecią bezprzewodową a internetem
d) w warstwie IV, ponieważ zarządza portami TCP/UDP urządzeń klienckich w celu zapewnienia poprawnej kontroli przepływu danych w paśmie 2,4Ghz
::

[Q] Co oznacza skrót MCS
>>>a) Modulation and Coding Scheme, to zestaw modulacji, kodowania, oraz strumieni przestrzennych, urządzenie komunikacji bezprzewodowej korzysta z takiego zestawienia i przełącza się np. z 16-QAM na 64-QAM, jeśli parametry transmisji są lepsze (bo np. bliżej stoimy)
b) maximum channel speed, czyli wskaźnik określający maksymalną teoretyczną prędkość pobierania danych jaką karta sieciowa może osiągnąć w idealnych warunkach na kanale 40Mhz
c) mobile communication standard, to protokół odpowiedzialny za płynne przełączanie urządzeń przenośnych pomiędzy pasmem 2,4Ghz a 5Ghz podczas poruszania się po obiekcie
d) multi carrier system, to sprzętowy moduł w routerach standardu 802.11n pozwalający na jednoczesne nadawanie sygnału na trzech niezależnych częstotliwościach nośnych
::

[Q] Czym się różni DS od WDS ?
>>>a) DS to przewodowy system dystrybucji, WDS to bezprzewodowy system dystrybucji.
b) DS to system szyfrowania danych za pomocą klucza statycznego, natomiast wds to nowszy standard zabezpieczeń dynamicznych wprowadzony w Wi-Fi 5
c) ds odpowiada za komunikację urządzeń w paśmie 2,4Ghz, podczas gdy wds jest protokołem przeznaczonym wyłącznie do zarządzania ruchem w paśmie 5Ghz
d) ds to topologia sieci bezprzewodowej typu ad-hoc, a wds to odmiana topologii infrastruktury wykorzystująca centralny kontroler w warstwie III
::

[Q] Co bardziej się opłacało na labie 6: 40 MHz czy 2 x 20 MHz?
>>>a) bardziej opłacało się 2 x 20 MHz, ponieważ w zatłoczonym środowisku laboratoryjnym węższe kanały zapewniały większą odporność na zakłócenia od sąsiednich stanowisk i stabilniejszą transmisję
b) bardziej opłacało się 40 MHz, ponieważ ta szerokość kanału automatycznie wymusza sprzętowe szyfrowanie bazy danych DNS na routerach brzegowych
c) bardziej opłacało się 40 MHz, ponieważ szeroki kanał jest wymagany przez protokół routingu dynamicznego OSPF do mapowania adresów fizycznych MAC
d) bardziej opłacało się 2 x 20 MHz, gdyż taka konfiguracja pozwala na przesyłanie zasilania POE bezpośrednio przez światłowody jednomodowe
::

[Q] Która sieć ad-hoc ma największą i najniższą wydajność?
>>>a) najwyższą wydajność mają sieci ad-hoc o stabilnej strukturze (np. stacjonarne sieci czujników - SPIN / SANET / WSN), natomiast najniższą sieci o bardzo wysokiej mobilności węzłów (np. VANET/FANET), gdzie ruch urządzeń stale zrywa ścieżki routingu
b) najwyższą wydajność mają sieci ad-hoc automatycznie czyszczące tablice ARP, a najniższą sieci realizujące szyfrowanie bazy danych na przełącznikach warstwy II
c) najwyższą wydajność mają sieci ad-hoc oparte na protokole routingu zewnętrznego BGP, a najniższą sieci filtrujące pakiety przez reguły zapory sieciowej IPtables
d) najwyższą wydajność mają sieci ad-hoc zasilane technologią POE, a najniższą sieci przesyłające zapytania DNS przez kable magistrali SCSI
::

[Q] Jakie metody można zastosować, aby rozwiązać problemy z anomaliami wydajności w sieciach bezprzewodowych?
>>>a) Zastosować mechanizm Airtime Fairness (ATF) dzielący czas antenowy równo pomiędzy stacje lub ustawić minimalny próg prędkości (Data Rate) odcinający najwolniejszych klientów
b) Wdrożyć protokół routingu dynamicznego RIP w celu automatycznego czyszczenia pamięci podręcznej lokalnych serwerów DNS
c) Skonfigurować reguły zapory sieciowej IPtables tak aby wymusić sprzętowe mapowanie adresów fizycznych MAC w warstwie III
d) Wymienić przewody magistrali SCSI na światłowody jednomodowe zasilane bezpośrednio technologią POE
::

[Q] Które pasmo częstotliwości jest lepsze do stworzenia sieci ad-hoc (2,4 czy 5 GHz)? Dlaczego?
>>>a) 5Ghz - zazwyczaj urządzenia sieci ad-hoc są blisko siebie, w jednym pomieszczeniu, w sieci 5Ghz jest mniej interferencji międzykanałowych (skoki co 4 kanały), oraz zewnętrznych np. z Bluetooth albo kuchenek mikrofalowych.
b) 5Ghz - ponieważ wyższa częstotliwość fali radiowej całkowicie eliminuje problem ukrytej stacji w topologii MANET bez konieczności stosowania mechanizmu RTS/CTS
c) 2,4Ghz - ponieważ niższa częstotliwość fali pozwala na automatyczną agregację do 8 strumieni MIMO co drastycznie zwiększa przepustowość sieci typu karta-karta
d) 5Ghz - ponieważ to pasmo radiowe jako jedyne w standardzie 802.11 obsługuje sprzętową fragmentację ramek za pomocą protokołu TPC
::

[Q] Jakie są charakterystyczne cechy sieci ad-hoc?
>>>a) Brak AP
b) Wymóg stosowania dedykowanego serwera DHCP oraz bazy danych OSPF na każdym urządzeniu klienckim
>>>c) Decentralizacja – każda stacja kliencka jest równorzędna i wspólnie odpowiada za utrzymanie sieci (np. rozsyłanie ramek Beacon)
d) Brak możliwości korzystania z pasma 2.4 GHz, co zmusza sieć do pracy wyłącznie w standardzie 802.11ac przy 80 MHz
::

[Q] Jakie są ograniczenia sieci ad-hoc?
>>>a) Problem ukrytego węzła (nie ma AP)
>>>b) Brak możliwości wdrożenia zaawansowanych technik uwierzytelniania np. RADIUS
>>>c) Anomalie wydajności (maksymalna przepustowość sieci to przepustowość najsłabszego ogniwa)
d) Ograniczenie maksymalnego zasięgu transmisji do sztywnych 3 metrów, narzucone przez standard warstwy fizycznej 802.11a
::

d) Sprzętowa zmiana adresów MAC w nagłówkach ramek w celu ukrycia tożsamości producenta karty sieciowej (OUI)

[Q] Co to SPP?

b) Protokół warstwy trzeciej służący do automatycznego wykrywania ukrytych identyfikatorów SSID i mitygacji anomalii wydajności
c) Narzędzie pakietu Aircrack-ng służące do offline-owego łamania 8-cyfrowych kodów PIN w usłudze WPS metodą tablic tęczowych

[Q] Jakiej modulacji używa bluetooth i dlaczego?

b) 1024-QAM – ponieważ oferuje najwyższą odporność na zaniki sygnału i pozwala na bezprzewodową emulację portu szeregowego w paśmie 5 GHz
c) CCK (Complementary Code Keying) – ponieważ eliminuje anomalię wydajności i jest wymagana przez profil DUN do obsługi komend AT
d) OFDM – ponieważ dzieli pasmo na 64 składowe podnośne, co jest niezbędne do poprawnego działania mechanizmu fragmentacji pakietów IP

b) Do emulacji fizycznego kabla szeregowego COM w celu uruchomienia tekstowego terminala Putty na warstwie RFCOMM
c) Do automatycznego rozsyłania grupowych kluczy szyfrujących GTK podczas przesyłania ramek deautentykacji
d) Do generowania skompresowanych tablic tęczowych bezpośrednio na karcie radiowej w celu mitygacji anomalii wydajności

[Q] Co to jest REFCOMM i z jakim profilem jest bezpośrednio związany?

b) Warstwa adaptacji protokołów (AVDT), która odpowiada za strumieniowanie multimediów i jest bezpośrednio powiązana z profilem A2DP
c) Protokół kontroli i emulacji łącza logicznego (L2CAP), który zarządza segmentacją pakietów i jest bezpośrednio powiązany z profilem PAN
d) Protokół aplikacji bezprzewodowych (WAP), który odpowiada za przesyłanie obiektów binarnych i jest bezpośrednio powiązany z profilem DUN

[Q] Jak urządzenia z Bluetooth radzą sobie z zakłóceniami radiowymi?
>>>a) Bluetooth jeśli wykryje jakaś interferencje to przełącza się na inny kanał i retransmituje zakłóconą ramkę.
b) Stosują technikę DFS (Dynamic Frequency Selection), która w przypadku wykrycia radaru pogodowego lub sieci Wi-Fi automatycznie przenosi całą pikosieć w wolne od zakłóceń pasmo 5 GHz.
c) Wykorzystują algorytm CSMA/CA oraz mechanizm wymiany ramek RTS/CTS, które przed każdą transmisją fizycznie blokują pasmo radiowe dla wszystkich obcych urządzeń w zasięgu.
d) Polegają na technologii MIMO (Multiple Input Multiple Output), która formuje wiązkę radiową (Beamforming) wokół źródła zakłóceń, całkowicie je tłumiąc.
::
 
[Q] Czym jest parked slave w architekturze sieci Bluetooth?
>>>a) Parked slave w Bluetooth oznacza nieaktywnego slave w pikosieci
b) To urządzenie peryferyjne, które czasowo rozłączyło się z pikosiecią i automatycznie przełączyło na nasłuchiwanie komend AT profilu DUN.
c) To stacja kliencka, która z powodu silnych zakłóceń radiowych została zablokowana przez mechanizm AFH i czeka na ponowne przesłanie ramek deautentykacji.
d) To urządzenie pełniące rolę Mastera w sąsiedniej pikosieci (scatternet), które czasowo zawiesiło nadawanie w celu oszczędzania baterii.

c) CSMA/CA wraz z procedurą powstrzymania (Backoff), który nakazuje stacji ciągłe badanie poziomu energii sygnału (CCA) przed wysłaniem każdej ramki

`;

            // --- LOGIKA APLIKACJI ---

            function cleanText(text) {
                return text
                    .replace(/lambda/gi, "λ")
                    .replace(/deg/gi, "°")
                    .replace(/sqrt/gi, "√")
                    .replace(/ohm/gi, "Ω")
                    .replace(/alpha/gi, "α")
                    .replace(/beta/gi, "β");
            }

            // Fisher-Yates shuffle
            function shuffleArray(array) {
                const arr = [...array];
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            function parseData(data) {
                const questions = [];
                // Split by [Q] marker
                const blocks = data
                    .split(/\[Q\]/)
                    .filter((x) => x.trim().length > 0);

                console.group("📋 PARSOWANIE PYTAŃ - RAPORT");
                console.log(`Znaleziono ${blocks.length} bloków [Q]`);

                blocks.forEach((content, idx) => {
                    const blockNum = idx + 1;
                    const previewText =
                        content.substring(0, 80).replace(/\n/g, " ").trim() +
                        "...";

                    // Check for explanation (after :: separator)
                    let mainContent = content;
                    let explanation = "";
                    const explanationMatch = content.split(/\n::\s*/);
                    if (explanationMatch.length > 1) {
                        mainContent = explanationMatch[0];
                        explanation = cleanText(
                            explanationMatch.slice(1).join("\n").trim(),
                        );
                    }

                    // Split content into Question and Answers
                    // Find first occurrence of A) or a) - POPRAWIONE REGEX
                    // Obsługuje: a), >>a), >>>a), >a), >>>>a) itd.
                    const match = mainContent.match(
                        /(\n|^)\s*(>{1,4})?\s*[a-zA-Z]\)/,
                    );
                    if (!match) {
                        console.warn(
                            `⚠️ Blok #${blockNum} POMINIĘTY - brak odpowiedzi (nie znaleziono wzorca "a)" lub ">>>a)")`,
                        );
                        console.warn(`   Treść: "${previewText}"`);
                        console.warn(
                            `   Pełna treść bloku:`,
                            mainContent.substring(0, 300),
                        );
                        return;
                    }

                    // ZACHOWAJ PRZEJŚCIA DO NOWEJ LINII W PYTANIU
                    const qText = mainContent.substring(0, match.index);
                    // Usuń puste linie na początku i końcu, ale zachowaj wewnętrzne przejścia
                    const qTextClean = qText
                        .replace(/^\s*\n/, "")
                        .replace(/\n\s*$/, "");

                    const answersBlock = mainContent.substring(match.index);

                    const answers = [];
                    const skippedLines = [];

                    // NOWY ALGORYTM: Łączy wieloliniowe odpowiedzi
                    // Regex do wykrycia początku odpowiedzi: opcjonalne > + litera + )
                    const answerStartRegex = /^(>{0,4})\s*([a-zA-Z])\)/;

                    const lines = answersBlock.split(/\n/);
                    let currentAnswer = null;

                    lines.forEach((line, lineIdx) => {
                        const trimmedLine = line.trim();
                        if (trimmedLine.length === 0) {
                            // Pusta linia - NIE dodawaj przejścia do nowej linii
                            // (puste linie są separatorami między odpowiedziami, nie częścią odpowiedzi)
                            return;
                        }

                        const answerMatch = trimmedLine.match(answerStartRegex);

                        if (answerMatch) {
                            // To jest początek nowej odpowiedzi
                            // Zapisz poprzednią odpowiedź jeśli istnieje (po usunięciu trailing whitespace)
                            if (currentAnswer !== null) {
                                currentAnswer.text = currentAnswer.text.replace(
                                    /\s+$/,
                                    "",
                                );
                                answers.push(currentAnswer);
                            }

                            const arrows = answerMatch[1];
                            const isCorrect = arrows.length >= 2; // >> lub więcej = poprawna
                            const answerText = trimmedLine
                                .replace(answerStartRegex, "")
                                .trim();

                            currentAnswer = {
                                text: cleanText(answerText),
                                correct: isCorrect,
                                originalLine: trimmedLine,
                            };
                        } else if (
                            currentAnswer !== null &&
                            !trimmedLine.startsWith("::")
                        ) {
                            // To jest kontynuacja poprzedniej odpowiedzi (wieloliniowa)
                            // Zachowaj przejście do nowej linii
                            currentAnswer.text += "\n" + cleanText(trimmedLine);
                            currentAnswer.originalLine += "\n" + trimmedLine;
                        } else if (
                            trimmedLine.length > 3 &&
                            !trimmedLine.startsWith("::")
                        ) {
                            // Linia przed pierwszą odpowiedzią lub po komentarzu
                            skippedLines.push({ lineIdx, line: trimmedLine });
                        }
                    });

                    // Dodaj ostatnią odpowiedź (po usunięciu trailing whitespace)
                    if (currentAnswer !== null) {
                        currentAnswer.text = currentAnswer.text.replace(
                            /\s+$/,
                            "",
                        );
                        answers.push(currentAnswer);
                    }

                    if (answers.length === 0) {
                        console.warn(
                            `⚠️ Blok #${blockNum} POMINIĘTY - nie znaleziono żadnych odpowiedzi`,
                        );
                        console.warn(`   Treść pytania: "${previewText}"`);
                        console.warn(
                            `   Blok odpowiedzi:`,
                            answersBlock.substring(0, 200),
                        );
                        return;
                    }

                    const correctAnswers = answers.filter((a) => a.correct);
                    if (correctAnswers.length === 0) {
                        console.warn(
                            `⚠️ Blok #${blockNum} - BRAK POPRAWNYCH ODPOWIEDZI (brak >> lub >>> przed odpowiedzią)`,
                        );
                        console.warn(`   Treść: "${previewText}"`);
                        console.warn(
                            `   Znalezione odpowiedzi:`,
                            answers.map((a) => a.originalLine.substring(0, 50)),
                        );
                    }

                    if (skippedLines.length > 0) {
                        console.info(
                            `ℹ️ Blok #${blockNum} - pominięte linie (komentarze?):`,
                            skippedLines,
                        );
                    }

                    // Shuffle answers
                    const shuffledAnswers = shuffleArray(answers);
                    // Assign new letters A, B, C...
                    shuffledAnswers.forEach((ans, i) => {
                        ans.id = String.fromCharCode(65 + i); // A, B, C, D...
                    });

                    questions.push({
                        text: cleanText(qTextClean), // Zachowuje przejścia do nowej linii
                        answers: shuffledAnswers,
                        type: "multi", // *** ZMIANA: WYMUSZENIE TRYBU WIELOKROTNEGO ***
                        explanation: explanation,
                        blockNumber: blockNum,
                    });

                    console.log(
                        `✅ Blok #${blockNum} OK - ${answers.length} odp., ${correctAnswers.length} poprawnych, typ: ${questions[questions.length - 1].type}`,
                    );
                });

                console.log(`\n📊 PODSUMOWANIE PARSOWANIA:`);
                console.log(`   Bloków [Q]: ${blocks.length}`);
                console.log(`   Sparsowanych pytań: ${questions.length}`);
                console.log(
                    `   Pominiętych: ${blocks.length - questions.length}`,
                );

                // POPRAWIONE: Usuwanie duplikatów na podstawie tytułu ORAZ odpowiedzi
                // Jeśli chociaż jedna odpowiedź się różni - pytanie jest unikalne
                const uniqueQuestions = [];
                const seenSignatures = new Set();
                const duplicates = [];

                questions.forEach((q) => {
                    // Twórz sygnaturę z tytułu + posortowanych odpowiedzi
                    const titlePart = q.text
                        .toLowerCase()
                        .replace(/\s+/g, " ")
                        .trim();
                    const answersPart = q.answers
                        .map((a) =>
                            a.text.toLowerCase().replace(/\s+/g, " ").trim(),
                        )
                        .sort()
                        .join("|");
                    const signature = titlePart + "|||" + answersPart;

                    if (!seenSignatures.has(signature)) {
                        seenSignatures.add(signature);
                        uniqueQuestions.push(q);
                    } else {
                        duplicates.push({
                            blockNumber: q.blockNumber,
                            text: q.text.substring(0, 60),
                        });
                    }
                });

                if (duplicates.length > 0) {
                    console.log(
                        `\n🔄 DUPLIKATY (usunięte - identyczny tytuł I odpowiedzi):`,
                    );
                    duplicates.forEach((d) =>
                        console.log(
                            `   Blok #${d.blockNumber}: "${d.text}..."`,
                        ),
                    );
                }

                console.log(
                    `\n✨ FINALNA LICZBA PYTAŃ: ${uniqueQuestions.length}`,
                );
                console.groupEnd();

                // Shuffle questions order
                return shuffleArray(uniqueQuestions);
            }

            // Funkcja pomocnicza do konwersji tekstu z \n na <br> dla HTML
            function textToHtml(text) {
                return text
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/\n/g, "<br>");
            }

            let allQuestions = [];
            let totalScore = 0;
            let answeredCount = 0;

            function renderQuiz() {
                allQuestions = parseData(rawData);
                const container = document.getElementById("quiz-container");
                container.innerHTML = "";

                document.getElementById("progress").innerText =
                    `Pytania: 0 / ${allQuestions.length}`;

                allQuestions.forEach((q, index) => {
                    const card = document.createElement("div");
                    card.className = "question-card";
                    card.id = `q-card-${index}`;

                    const inputType = q.type === "multi" ? "checkbox" : "radio";
                    const typeLabel =
                        q.type === "multi" ? "(Wielokrotny wybór)" : "";

                    let answersHtml = "";
                    q.answers.forEach((ans, aIndex) => {
                        // Zachowuje przejścia do nowej linii w odpowiedziach
                        answersHtml += `
                <label class="option-btn" id="lbl-${index}-${aIndex}">
                    <input type="${inputType}" name="q${index}" value="${aIndex}">
                    <span><b>${ans.id})</b> ${textToHtml(ans.text)}</span>
                </label>
            `;
                    });

                    // Zmieniono: dodano przycisk "Sprawdź" widoczny od razu
                    // Dodano przycisk wyjaśnienia jeśli istnieje
                    let explanationHtml = "";
                    if (q.explanation) {
                        explanationHtml = `
                <div class="explanation-container" id="expl-container-${index}" style="display: none;">
                    <button class="show-explanation-btn" onclick="toggleExplanation(${index})">💡 Pokaż wyjaśnienie</button>
                    <div class="explanation-text hidden" id="expl-text-${index}">${q.explanation}</div>
                </div>
            `;
                    }

                    card.innerHTML = `
            <div class="q-header">
                <span>Pytanie ${index + 1}</span>
                <span>${typeLabel}</span>
            </div>
            <div class="q-text">${textToHtml(q.text)}</div>
            <div class="options-grid">
                ${answersHtml}
            </div>
            <div class="actions">
                <button class="check-btn" id="btn-check-${index}" onclick="checkAnswer(${index})">Sprawdź</button>
            </div>
            ${explanationHtml}
        `;
                    container.appendChild(card);
                });
            }

            function checkAnswer(qIndex) {
                const q = allQuestions[qIndex];
                const card = document.getElementById(`q-card-${qIndex}`);
                const inputs = document.querySelectorAll(
                    `input[name="q${qIndex}"]`,
                );
                const btn = document.getElementById(`btn-check-${qIndex}`);

                let allCorrect = true;
                let anySelected = false;

                // Najpierw sprawdzamy czy cokolwiek zaznaczono
                inputs.forEach((input) => {
                    if (input.checked) anySelected = true;
                });

                if (!anySelected) return; // Jeśli nic nie zaznaczono, nie sprawdzaj

                inputs.forEach((input) => {
                    const ansIndex = parseInt(input.value);
                    const label = document.getElementById(
                        `lbl-${qIndex}-${ansIndex}`,
                    );
                    const isCorrect = q.answers[ansIndex].correct;

                    // Reset styles
                    label.classList.remove(
                        "is-correct",
                        "is-wrong",
                        "should-be",
                    );

                    if (input.checked) {
                        if (isCorrect) {
                            label.classList.add("is-correct");
                        } else {
                            label.classList.add("is-wrong");
                            allCorrect = false;
                        }
                    }

                    // Blokujemy zmianę odpowiedzi po sprawdzeniu
                    input.disabled = true;
                    label.classList.add("disabled");
                });

                // Show missing correct answers
                inputs.forEach((input) => {
                    const ansIndex = parseInt(input.value);
                    const label = document.getElementById(
                        `lbl-${qIndex}-${ansIndex}`,
                    );
                    const isCorrect = q.answers[ansIndex].correct;

                    if (isCorrect && !input.checked) {
                        label.classList.add("should-be");
                        allCorrect = false;
                    }
                });

                if (allCorrect) {
                    card.classList.add("correct");
                    card.classList.remove("wrong");
                } else {
                    card.classList.add("wrong");
                    card.classList.remove("correct");
                }

                // Ukrywamy przycisk po sprawdzeniu
                btn.style.display = "none";

                // Pokazujemy kontener z wyjaśnieniem (jeśli istnieje)
                const explContainer = document.getElementById(
                    `expl-container-${qIndex}`,
                );
                if (explContainer) {
                    explContainer.style.display = "block";
                }

                updateScore();
            }

            function toggleExplanation(qIndex) {
                const explText = document.getElementById(`expl-text-${qIndex}`);
                const btn = document.querySelector(
                    `#expl-container-${qIndex} .show-explanation-btn`,
                );

                if (explText.classList.contains("hidden")) {
                    explText.classList.remove("hidden");
                    btn.textContent = "🔽 Ukryj wyjaśnienie";
                } else {
                    explText.classList.add("hidden");
                    btn.textContent = "💡 Pokaż wyjaśnienie";
                }
            }

            function updateScore() {
                const cards = document.querySelectorAll(".question-card");
                let correctCount = 0;
                let attempted = 0;

                cards.forEach((card) => {
                    if (card.classList.contains("correct")) correctCount++;
                    if (
                        card.classList.contains("correct") ||
                        card.classList.contains("wrong")
                    )
                        attempted++;
                });

                const percent =
                    attempted === 0
                        ? 0
                        : Math.round((correctCount / attempted) * 100);
                document.getElementById("score").innerText = percent;
                document.getElementById("progress").innerText =
                    `Odpowiedziano: ${attempted} / ${allQuestions.length}`;
            }

            function resetQuiz() {
                renderQuiz();
                document.getElementById("score").innerText = "0";
                window.scrollTo(0, 0);
            }

            // Start
            renderQuiz();
        </script>
